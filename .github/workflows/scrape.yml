name: Scrape Table Sums

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies for 24f3000934@ds.study.iitm.ac.in
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run Playwright Scraper
        run: node scrape.js
